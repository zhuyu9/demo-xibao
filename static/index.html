<!doctype html>
<html lang="zh">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>ASR 语音识别测试</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --bg: #08090b;
                --bg-card: #0c0e13;
                --border: #18212e;
                --accent: #00ff9d;
                --accent-dim: rgba(0, 255, 157, 0.1);
                --red: #ff3358;
                --red-dim: rgba(255, 51, 88, 0.12);
                --text: #ddeaf8;
                --muted: #2a3a4e;
                --interim: #4a6580;
            }

            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                background: var(--bg);
                color: var(--text);
                font-family: "Syncopate", sans-serif;
                min-height: 100vh;
                display: grid;
                grid-template-rows: auto 1fr auto;
                overflow-x: hidden;
            }

            /* Subtle grid */
            body::before {
                content: "";
                position: fixed;
                inset: 0;
                background-image:
                    linear-gradient(var(--border) 1px, transparent 1px),
                    linear-gradient(90deg, var(--border) 1px, transparent 1px);
                background-size: 40px 40px;
                pointer-events: none;
                opacity: 0.55;
                z-index: 0;
            }

            /* Radial vignette */
            body::after {
                content: "";
                position: fixed;
                inset: 0;
                background: radial-gradient(
                    ellipse at 50% 40%,
                    transparent 20%,
                    var(--bg) 75%
                );
                pointer-events: none;
                z-index: 0;
            }

            /* ── Header ── */
            header {
                position: relative;
                z-index: 1;
                padding: 22px 32px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                border-bottom: 1px solid var(--border);
            }

            .logo {
                font-size: 12px;
                font-weight: 700;
                letter-spacing: 0.35em;
                color: var(--accent);
            }
            .logo span {
                color: var(--muted);
                font-weight: 400;
            }

            .badge {
                font-size: 9px;
                letter-spacing: 0.2em;
                color: var(--muted);
                border: 1px solid var(--border);
                padding: 4px 12px;
                text-transform: uppercase;
            }

            /* ── Main ── */
            main {
                position: relative;
                z-index: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 52px;
                padding: 64px 24px;
            }

            /* ── Button area ── */
            .record-area {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 28px;
            }

            .btn-wrap {
                position: relative;
                width: 156px;
                height: 156px;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            /* Ripple rings — only visible during recording */
            .ring {
                position: absolute;
                inset: 0;
                border-radius: 50%;
                border: 1px solid var(--red);
                opacity: 0;
                pointer-events: none;
            }
            .btn-wrap.recording .ring:nth-child(1) {
                animation: ripple 2.4s ease-out infinite 0s;
            }
            .btn-wrap.recording .ring:nth-child(2) {
                animation: ripple 2.4s ease-out infinite 0.8s;
            }
            .btn-wrap.recording .ring:nth-child(3) {
                animation: ripple 2.4s ease-out infinite 1.6s;
            }

            @keyframes ripple {
                0% {
                    transform: scale(1);
                    opacity: 0.7;
                }
                100% {
                    transform: scale(2.5);
                    opacity: 0;
                }
            }

            .btn-record {
                width: 100%;
                height: 100%;
                border-radius: 50%;
                border: 1.5px solid var(--accent);
                background: var(--accent-dim);
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                position: relative;
                z-index: 1;
                transition:
                    border-color 0.3s,
                    background 0.3s,
                    box-shadow 0.3s;
                outline: none;
                -webkit-tap-highlight-color: transparent;
            }

            .btn-record:hover {
                box-shadow:
                    0 0 48px rgba(0, 255, 157, 0.15),
                    0 0 100px rgba(0, 255, 157, 0.05);
            }

            .btn-record.recording {
                border-color: var(--red);
                background: var(--red-dim);
                box-shadow: 0 0 48px rgba(255, 51, 88, 0.2);
            }

            .btn-record svg {
                color: var(--accent);
                transition: color 0.3s;
            }
            .btn-record.recording svg {
                color: var(--red);
            }

            /* ── Waveform ── */
            .waveform {
                display: flex;
                align-items: center;
                gap: 4px;
                height: 32px;
                opacity: 0;
                transition: opacity 0.4s;
            }
            .waveform.active {
                opacity: 1;
            }

            .waveform b {
                display: block;
                width: 3px;
                border-radius: 2px;
                background: var(--red);
                animation: wave 1.15s ease-in-out infinite;
            }
            .waveform b:nth-child(1) {
                height: 8px;
                animation-delay: 0s;
            }
            .waveform b:nth-child(2) {
                height: 18px;
                animation-delay: 0.1s;
            }
            .waveform b:nth-child(3) {
                height: 28px;
                animation-delay: 0.2s;
            }
            .waveform b:nth-child(4) {
                height: 20px;
                animation-delay: 0.3s;
            }
            .waveform b:nth-child(5) {
                height: 32px;
                animation-delay: 0.4s;
            }
            .waveform b:nth-child(6) {
                height: 20px;
                animation-delay: 0.3s;
            }
            .waveform b:nth-child(7) {
                height: 28px;
                animation-delay: 0.2s;
            }
            .waveform b:nth-child(8) {
                height: 18px;
                animation-delay: 0.1s;
            }
            .waveform b:nth-child(9) {
                height: 8px;
                animation-delay: 0s;
            }

            @keyframes wave {
                0%,
                100% {
                    transform: scaleY(0.3);
                    opacity: 0.45;
                }
                50% {
                    transform: scaleY(1);
                    opacity: 1;
                }
            }

            /* ── Status ── */
            .status {
                font-size: 9px;
                letter-spacing: 0.28em;
                text-transform: uppercase;
                color: var(--muted);
                transition: color 0.3s;
                min-height: 1.5em;
                text-align: center;
            }
            .status.connecting {
                color: var(--accent);
            }
            .status.recording {
                color: var(--red);
            }
            .status.stopped {
                color: var(--muted);
            }
            .status.error {
                color: #ff9900;
            }

            /* ── Transcript ── */
            .transcript-wrap {
                width: 100%;
                max-width: 740px;
            }

            .transcript-label {
                font-size: 9px;
                letter-spacing: 0.3em;
                color: var(--muted);
                text-transform: uppercase;
                margin-bottom: 10px;
            }

            .transcript-card {
                background: var(--bg-card);
                border: 1px solid var(--border);
                padding: 28px 32px;
                font-family: "Courier Prime", monospace;
                font-size: 17px;
                line-height: 1.85;
                min-height: 160px;
                max-height: 340px;
                overflow-y: auto;
                position: relative;
                scrollbar-width: thin;
                scrollbar-color: var(--border) transparent;
            }

            /* HUD corner marks */
            .transcript-card::before,
            .transcript-card::after {
                content: "";
                position: absolute;
                width: 14px;
                height: 14px;
                border-color: var(--accent);
                border-style: solid;
                opacity: 0.6;
            }
            .transcript-card::before {
                top: -1px;
                left: -1px;
                border-width: 2px 0 0 2px;
            }
            .transcript-card::after {
                bottom: -1px;
                right: -1px;
                border-width: 0 2px 2px 0;
            }

            #history {
                color: var(--text);
                white-space: pre-wrap;
                word-break: break-word;
            }
            #interim {
                color: var(--interim);
                font-style: italic;
            }

            .cursor {
                display: inline-block;
                width: 9px;
                height: 18px;
                background: var(--accent);
                vertical-align: text-bottom;
                margin-left: 3px;
                animation: blink 1s step-end infinite;
            }
            @keyframes blink {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0;
                }
            }

            .placeholder {
                color: var(--muted);
                font-style: italic;
            }

            /* ── Response card ── */
            .response-wrap {
                width: 100%;
                max-width: 740px;
            }

            .response-card {
                --accent: #ffb347;
                --accent-dim: rgba(255, 179, 71, 0.08);
            }

            .response-card::before,
            .response-card::after {
                border-color: var(--accent);
            }

            #responseText {
                color: var(--text);
                white-space: pre-wrap;
                word-break: break-word;
            }

            .response-cursor {
                display: inline-block;
                width: 9px;
                height: 18px;
                background: #ffb347;
                vertical-align: text-bottom;
                margin-left: 3px;
                animation: blink 1s step-end infinite;
            }

            .response-thinking {
                color: #ffb347;
                font-style: italic;
                font-size: 13px;
                opacity: 0.7;
            }

            /* ── TTS Toggle ── */
            .tts-toggle {
                display: flex;
                align-items: center;
                gap: 10px;
                font-size: 9px;
                letter-spacing: 0.2em;
                text-transform: uppercase;
                color: var(--muted);
                cursor: pointer;
                user-select: none;
            }

            .tts-toggle input[type="checkbox"] {
                appearance: none;
                -webkit-appearance: none;
                width: 36px;
                height: 18px;
                background: var(--border);
                border-radius: 9px;
                cursor: pointer;
                position: relative;
                transition: background 0.3s;
                flex-shrink: 0;
            }

            .tts-toggle input[type="checkbox"]:checked {
                background: var(--accent);
            }

            .tts-toggle input[type="checkbox"]::after {
                content: "";
                position: absolute;
                width: 12px;
                height: 12px;
                background: var(--bg);
                border-radius: 50%;
                top: 3px;
                left: 3px;
                transition: transform 0.3s;
            }

            .tts-toggle input[type="checkbox"]:checked::after {
                transform: translateX(18px);
            }

            /* ── Conversation History ── */
            .history-wrap {
                width: 100%;
                max-width: 740px;
                border: 1px solid var(--border);
                background: var(--bg-card);
            }

            .history-summary {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 14px 20px;
                font-size: 9px;
                letter-spacing: 0.3em;
                text-transform: uppercase;
                color: var(--muted);
                cursor: pointer;
                user-select: none;
                list-style: none;
                outline: none;
            }
            .history-summary::-webkit-details-marker { display: none; }
            .history-summary:focus-visible { outline: 1px solid var(--accent); }

            .history-badge {
                background: var(--border);
                color: var(--muted);
                font-size: 8px;
                padding: 2px 7px;
                letter-spacing: 0.15em;
            }

            .history-chevron {
                margin-left: auto;
                opacity: 0.45;
                font-size: 10px;
                transition: transform 0.2s;
                line-height: 1;
            }

            details[open] .history-chevron { transform: rotate(180deg); }

            .history-panel {
                padding: 0 24px 20px;
                display: flex;
                flex-direction: column;
                max-height: 420px;
                overflow-y: auto;
                scrollbar-width: thin;
                scrollbar-color: var(--border) transparent;
            }

            .history-entry {
                padding: 16px 0;
                border-top: 1px solid var(--border);
                display: flex;
                flex-direction: column;
                gap: 10px;
            }
            .history-entry:first-child { border-top: none; padding-top: 8px; }

            .history-row {
                display: grid;
                grid-template-columns: 48px 1fr;
                gap: 12px;
                align-items: baseline;
            }

            .history-role {
                font-size: 8px;
                letter-spacing: 0.2em;
                text-transform: uppercase;
                opacity: 0.4;
                white-space: nowrap;
                padding-top: 2px;
            }

            .history-content {
                font-family: "Courier Prime", monospace;
                font-size: 14px;
                line-height: 1.75;
                white-space: pre-wrap;
                word-break: break-word;
            }

            .history-row.user .history-content { color: var(--interim); }
            .history-row.bot .history-content { color: #c48940; }

            /* ── Footer ── */
            footer {
                position: relative;
                z-index: 1;
                padding: 14px 32px;
                border-top: 1px solid var(--border);
                font-size: 9px;
                letter-spacing: 0.18em;
                color: var(--muted);
                display: flex;
                justify-content: space-between;
                flex-wrap: wrap;
                gap: 8px;
            }
        </style>
    </head>
    <body>
        <header>
            <div class="logo">XIBAO <span>/ ASR TEST</span></div>
            <label class="tts-toggle">
                <input type="checkbox" id="ttsToggle" checked />
                语音播报
            </label>
            <div class="badge">DashScope · PCM · 16kHz</div>
        </header>

        <main>
            <div class="record-area">
                <div class="btn-wrap" id="btnWrap">
                    <div class="ring"></div>
                    <div class="ring"></div>
                    <div class="ring"></div>
                    <button
                        class="btn-record"
                        id="btnRecord"
                        aria-label="开始录音"
                    >
                        <svg
                            width="44"
                            height="44"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="1.5"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <rect x="9" y="2" width="6" height="11" rx="3" />
                            <path d="M5 10a7 7 0 0 0 14 0" />
                            <line x1="12" y1="17" x2="12" y2="21" />
                            <line x1="8" y1="21" x2="16" y2="21" />
                        </svg>
                    </button>
                </div>

                <div class="waveform" id="waveform">
                    <b></b><b></b><b></b><b></b><b></b><b></b><b></b><b></b
                    ><b></b>
                </div>

                <div class="status" id="status">点击麦克风开始录音</div>
            </div>

            <div class="transcript-wrap">
                <div class="transcript-label">识别结果</div>
                <div class="transcript-card" id="card">
                    <span id="history"></span><span id="interim"></span
                    ><span class="cursor" id="cur"></span>
                </div>
            </div>

            <div class="response-wrap" id="responseWrap" style="display: none">
                <div class="transcript-label">犀宝的回应</div>
                <div class="transcript-card response-card" id="responseCard">
                    <span id="responseText"></span
                    ><span
                        class="response-cursor"
                        id="responseCursor"
                        style="display: none"
                    ></span>
                </div>
            </div>
            <details class="history-wrap" id="historyDetails" style="display:none">
                <summary class="history-summary">
                    对话历史
                    <span class="history-badge" id="historyCount">0</span>
                    <span class="history-chevron">▾</span>
                </summary>
                <div class="history-panel" id="historyPanel"></div>
            </details>
        </main>

        <footer>
            <span id="ws-url-display">ws://&lt;host&gt;/ws</span>
            <span>qwen3-asr-flash-realtime</span>
        </footer>

        <script>
            // 自动计算 basePath：如果部署在子路径下（如 /xibao），自动添加前缀
            const basePath = (() => {
                const pathname = window.location.pathname;
                // 如果路径超过一层，且不是以 /static 或 /ws 开头，去掉最后一段
                if (pathname === '/' || pathname === '') return '';
                const segments = pathname.split('/').filter(s => s);
                // 如果当前在 /xibao/ 或 /xibao/some-page，返回 /xibao
                return segments.length > 0 ? '/' + segments[0] : '';
            })();

            // 会话 ID 持久化到 localStorage，同一浏览器永远使用同一个 ID
            const SESSION_KEY = "xibao_session_id";
            const HISTORY_KEY = "xibao_history";

            const sessionId = (() => {
                let id = localStorage.getItem(SESSION_KEY);
                if (!id) {
                    id = crypto.randomUUID();
                    localStorage.setItem(SESSION_KEY, id);
                }
                return id;
            })();

            const btnWrap = document.getElementById("btnWrap");
            const btn = document.getElementById("btnRecord");
            const statusEl = document.getElementById("status");
            const historyEl = document.getElementById("history");
            const interimEl = document.getElementById("interim");
            const waveform = document.getElementById("waveform");
            const card = document.getElementById("card");
            const responseWrap = document.getElementById("responseWrap");
            const responseCard = document.getElementById("responseCard");
            const responseText = document.getElementById("responseText");
            const responseCursor = document.getElementById("responseCursor");
            const historyDetails = document.getElementById("historyDetails");
            const historyPanel = document.getElementById("historyPanel");
            const historyCountEl = document.getElementById("historyCount");

            let conversationHistory = [];
            let currentResponseText = "";

            let isRecording = false;
            let ws = null;
            let audioCtx = null;
            let workletNode = null;
            let sourceNode = null;
            let stream = null;
            let ttsEnabled = false;

            // 分句流式 TTS 状态
            let sentenceBuffer = "";   // 当前积累的句子片段
            let ttsQueue = [];         // fetch promise 队列（按顺序）
            let ttsScheduledEnd = 0;   // 最后一个已调度音频的结束时刻
            let ttsLastSource = null;  // 最后一个 BufferSource，用于挂 onended
            let llmStreamDone = false; // LLM 是否已发出 [DONE]
            let ttsQueueProcessing = false; // 队列是否正在处理中

            const SENTENCE_RE = /[。！？!?…\n]/;

            const ttsToggle = document.getElementById("ttsToggle");
            ttsEnabled = ttsToggle.checked;
            ttsToggle.addEventListener("change", () => {
                ttsEnabled = ttsToggle.checked;
            });

            btn.addEventListener("click", () => {
                if (!isRecording) startRecording();
                else stopRecording();
            });

            async function startRecording() {
                try {
                    setStatus("请求麦克风权限…", "connecting");
                    stream = await navigator.mediaDevices.getUserMedia({
                        audio: true,
                        video: false,
                    });

                    closeAudioCtx();  // 清理可能残留的上一次 TTS audioCtx
                    audioCtx = new AudioContext();
                    await audioCtx.audioWorklet.addModule(
                        basePath + "/static/worklets/audio-processor.worklet.js",
                    );

                    setStatus("连接服务器…", "connecting");
                    const wsProtocol =
                        window.location.protocol === "https:" ? "wss:" : "ws:";
                    const wsUrl = `${wsProtocol}//${window.location.host}${basePath}/ws`;
                    document.getElementById("ws-url-display").textContent =
                        wsUrl;
                    ws = new WebSocket(wsUrl);
                    ws.binaryType = "arraybuffer";

                    ws.onopen = () => {
                        workletNode = new AudioWorkletNode(
                            audioCtx,
                            "pcm-processor",
                        );
                        workletNode.port.onmessage = (e) => {
                            if (ws && ws.readyState === WebSocket.OPEN)
                                ws.send(e.data);
                        };
                        sourceNode = audioCtx.createMediaStreamSource(stream);
                        sourceNode.connect(workletNode);
                        workletNode.connect(audioCtx.destination);

                        isRecording = true;
                        btn.classList.add("recording");
                        btnWrap.classList.add("recording");
                        waveform.classList.add("active");
                        clearTranscript();
                        setStatus("录音中…", "recording");
                    };

                    ws.onmessage = (e) => handleResult(JSON.parse(e.data));

                    ws.onerror = () => {
                        setStatus("连接错误", "error");
                        cleanup();
                    };

                    ws.onclose = () => {
                        if (isRecording) {
                            cleanup();
                            setStatus("连接已断开", "stopped");
                        }
                    };
                } catch (err) {
                    setStatus("错误: " + err.message, "error");
                    cleanup();
                }
            }

            function stopRecording() {
                if (ws && ws.readyState === WebSocket.OPEN) ws.send("finish");
                setStatus("处理最终结果…", "stopped");
                btn.classList.remove("recording");
                btnWrap.classList.remove("recording");
                waveform.classList.remove("active");
                isRecording = false;
                setTimeout(cleanup, 3500);
            }

            function handleResult(data) {
                if (data.type === "result") {
                    if (data.is_final) {
                        if (data.text) historyEl.textContent += data.text;
                        interimEl.textContent = "";
                    } else {
                        interimEl.textContent = data.text || "";
                    }
                    scrollBottom();
                } else if (data.type === "finished") {
                    interimEl.textContent = "";
                    cleanup();
                    setStatus("录音已完成", "stopped");
                    const finalText = historyEl.textContent.trim();
                    if (finalText) streamLLMResponse(finalText);
                } else if (data.type === "error") {
                    setStatus("错误: " + data.message, "error");
                    cleanup();
                }
            }

            function cleanup() {
                isRecording = false;
                btn.classList.remove("recording");
                btnWrap.classList.remove("recording");
                waveform.classList.remove("active");
                if (workletNode) {
                    workletNode.disconnect();
                    workletNode = null;
                }
                if (sourceNode) {
                    sourceNode.disconnect();
                    sourceNode = null;
                }
                // audioCtx 保留给 TTS 播放用，TTS 结束后由 closeAudioCtx() 关闭
                if (stream) {
                    stream.getTracks().forEach((t) => t.stop());
                    stream = null;
                }
                if (ws) {
                    ws.close();
                    ws = null;
                }
            }

            function closeAudioCtx() {
                if (audioCtx) {
                    audioCtx.close();
                    audioCtx = null;
                }
            }

            function clearTranscript() {
                historyEl.textContent = "";
                interimEl.textContent = "";
            }

            function setStatus(text, cls) {
                statusEl.textContent = text;
                statusEl.className = "status " + (cls || "");
            }

            function scrollBottom() {
                card.scrollTop = card.scrollHeight;
            }

            async function streamLLMResponse(text) {
                responseWrap.style.display = "";
                responseText.textContent = "";
                responseText.innerHTML =
                    '<span class="response-thinking">犀宝思考中…</span>';
                responseCursor.style.display = "none";

                // 重置当前回复文本
                currentResponseText = "";

                // 重置分句 TTS 状态
                sentenceBuffer = "";
                ttsQueue = [];
                ttsScheduledEnd = 0;
                ttsLastSource = null;
                llmStreamDone = false;
                ttsQueueProcessing = false;

                try {
                    const res = await fetch(basePath + "/api/chat/stream", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ text, session_id: sessionId }),
                    });

                    if (!res.ok) {
                        responseText.textContent = "（犀宝暂时不在线噻…）";
                        closeAudioCtx();
                        return;
                    }

                    responseText.textContent = "";
                    responseCursor.style.display = "inline-block";

                    const reader = res.body.getReader();
                    const decoder = new TextDecoder();
                    let buffer = "";

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split("\n");
                        buffer = lines.pop();
                        for (const line of lines) {
                            if (!line.startsWith("data: ")) continue;
                            const payload = line.slice(6);
                            if (payload === "[DONE]") {
                                responseCursor.style.display = "none";
                                addHistoryEntry(text, currentResponseText);
                                llmStreamDone = true;
                                // 冲刷剩余不含句末标点的尾句
                                const remaining = sentenceBuffer.trim();
                                sentenceBuffer = "";
                                if (ttsEnabled) {
                                    if (remaining) {
                                        startTTSFetch(remaining);
                                        // drainTTSQueue 处理完后会调用 onAllTTSScheduled
                                    } else if (!ttsQueueProcessing && ttsQueue.length === 0) {
                                        onAllTTSScheduled();
                                    }
                                    // 否则 drainTTSQueue 仍在运行，结束时会调用 onAllTTSScheduled
                                } else {
                                    closeAudioCtx();
                                }
                                return;
                            }
                            responseText.textContent += payload;
                            currentResponseText += payload;
                            // 检测句末标点，命中则立即发起 TTS 请求
                            if (ttsEnabled) {
                                sentenceBuffer += payload;
                                const match = SENTENCE_RE.exec(sentenceBuffer);
                                if (match) {
                                    const sentence = sentenceBuffer
                                        .slice(0, match.index + 1)
                                        .trim();
                                    sentenceBuffer = sentenceBuffer.slice(match.index + 1);
                                    if (sentence) startTTSFetch(sentence);
                                }
                            }
                            responseCard.scrollTop = responseCard.scrollHeight;
                        }
                    }
                } catch (err) {
                    responseText.textContent = "（犀宝睡着了，锤子都叫不醒…）";
                    closeAudioCtx();
                } finally {
                    responseCursor.style.display = "none";
                }
            }

            // 立即发起 TTS fetch，将 promise 推入有序队列
            function startTTSFetch(text) {
                if (!ttsEnabled || !text.trim()) return;
                ttsQueue.push(fetchAndDecodeTTS(text));
                drainTTSQueue();
            }

            // 顺序消费队列：fetch 并行，但调度严格按原句顺序串行
            async function drainTTSQueue() {
                if (ttsQueueProcessing) return;
                ttsQueueProcessing = true;
                while (ttsQueue.length > 0) {
                    const promise = ttsQueue.shift();
                    // 按顺序 await：即使后句先下载完，也等前句调度完再排后句
                    const audioBuffer = await promise;
                    if (audioBuffer && audioCtx) {
                        const ctx = audioCtx;
                        // 调度点 = 上一段结束时刻（或当前时刻+缓冲），保证无缝衔接
                        const startTime = Math.max(ctx.currentTime + 0.05, ttsScheduledEnd);
                        ttsScheduledEnd = startTime + audioBuffer.duration;
                        const source = ctx.createBufferSource();
                        source.buffer = audioBuffer;
                        source.connect(ctx.destination);
                        source.start(startTime);
                        ttsLastSource = source;
                    }
                }
                ttsQueueProcessing = false;
                if (llmStreamDone) onAllTTSScheduled();
            }

            // fetch → decode 仅返回 AudioBuffer，不触碰调度时序
            async function fetchAndDecodeTTS(text) {
                try {
                    const res = await fetch(basePath + "/api/tts/stream", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ text }),
                    });
                    if (!res.ok || !audioCtx) return null;
                    const arrayBuffer = await res.arrayBuffer();
                    const ctx = audioCtx;
                    if (!ctx) return null;
                    if (ctx.state === "suspended") await ctx.resume();
                    return await ctx.decodeAudioData(arrayBuffer);
                } catch (err) {
                    console.error("TTS error:", err);
                    return null;
                }
            }

            // 所有句子均已调度完毕，在最后一段播完后关闭 AudioContext
            function onAllTTSScheduled() {
                if (ttsLastSource) {
                    ttsLastSource.onended = closeAudioCtx;
                } else {
                    closeAudioCtx();
                }
            }

            // ── Conversation History ──
            function renderHistoryEntry(userText, botText) {
                const entry = document.createElement("div");
                entry.className = "history-entry";

                const userRow = document.createElement("div");
                userRow.className = "history-row user";
                userRow.innerHTML =
                    `<span class="history-role">老大</span>` +
                    `<span class="history-content">${escapeHtml(userText)}</span>`;

                const botRow = document.createElement("div");
                botRow.className = "history-row bot";
                botRow.innerHTML =
                    `<span class="history-role">犀宝</span>` +
                    `<span class="history-content">${escapeHtml(botText)}</span>`;

                entry.appendChild(userRow);
                entry.appendChild(botRow);
                historyPanel.appendChild(entry);
            }

            function addHistoryEntry(userText, botText) {
                if (!userText && !botText) return;
                conversationHistory.push({ user: userText, bot: botText });
                try { localStorage.setItem(HISTORY_KEY, JSON.stringify(conversationHistory)); } catch (e) {}
                historyCountEl.textContent = conversationHistory.length;
                historyDetails.style.display = "";
                renderHistoryEntry(userText, botText);
            }

            function escapeHtml(str) {
                return str
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;");
            }

            // 页面加载时从 localStorage 恢复历史记录
            (() => {
                try {
                    const saved = localStorage.getItem(HISTORY_KEY);
                    if (saved) conversationHistory = JSON.parse(saved);
                } catch (e) { conversationHistory = []; }
                if (conversationHistory.length > 0) {
                    historyDetails.style.display = "";
                    historyCountEl.textContent = conversationHistory.length;
                    conversationHistory.forEach(e => renderHistoryEntry(e.user, e.bot));
                }
            })();
        </script>
    </body>
</html>
